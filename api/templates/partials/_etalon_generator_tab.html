<div id="generate-etalons-tab" class="tab-content">
    <div class="upload-section">
        <h4>Generate etalons</h4>
        <form id="generate-etalons-form">
            <div class="control-group">
                <label for="generate-etalons-device-name">Device name</label>
                <input type="text" id="generate-etalons-device-name" required>
            </div>
            <div class="control-group">
                <label for="generate-etalons-pattern-name">Pattern name</label>
                <input type="text" id="generate-etalons-pattern-name" required>
            </div>
            <button type="submit" class="btn">Generate</button>
        </form>
        <div id="generate-etalons-output"></div>
    </div>
</div>
